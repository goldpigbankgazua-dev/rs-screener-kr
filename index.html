<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KR RS Screener · 한국 주가상승률 스크리너</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14171c;
    --panel-2: #1a1e25;
    --border: #262b34;
    --text: #e6e8ec;
    --muted: #8a92a3;
    --accent: #6ea8ff;
    --up: #ff5b6e;     /* 한국 관행: 상승 빨강 */
    --down: #4f9eff;   /* 한국 관행: 하락 파랑 */
    --chip: #232833;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", "Segoe UI", Roboto, sans-serif; }
  a { color: var(--accent); text-decoration: none; }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 24px 16px 64px; }
  header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
  h1 { font-size: 22px; margin: 0; }
  .sub { color: var(--muted); font-size: 13px; }
  .meta { color: var(--muted); font-size: 12px; }

  .controls { display: grid; grid-template-columns: 1fr; gap: 10px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 12px; }
  @media (min-width: 720px) { .controls { grid-template-columns: 1.4fr 1fr 1fr 1fr; } }

  .control label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  input[type="search"], select {
    width: 100%; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 14px;
  }
  input[type="search"]::placeholder { color: var(--muted); }

  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { background: var(--chip); color: var(--text); border: 1px solid var(--border); border-radius: 999px; padding: 4px 10px; font-size: 12px; cursor: pointer; user-select: none; }
  .chip.active { background: var(--accent); color: #0b0d10; border-color: var(--accent); }

  .tabbar { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .tab { background: var(--panel); border: 1px solid var(--border); padding: 6px 14px; border-radius: 999px; font-size: 13px; color: var(--muted); cursor: pointer; }
  .tab.active { color: var(--text); border-color: var(--accent); }

  .tablewrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 12px; background: var(--panel); }
  table { width: 100%; border-collapse: collapse; min-width: 900px; }
  th, td { padding: 10px 12px; font-size: 13px; text-align: right; white-space: nowrap; }
  th:nth-child(1), th:nth-child(2), th:nth-child(3),
  td:nth-child(1), td:nth-child(2), td:nth-child(3) { text-align: left; }
  thead th { position: sticky; top: 0; background: var(--panel-2); color: var(--muted); font-weight: 600; cursor: pointer; border-bottom: 1px solid var(--border); }
  thead th .arrow { color: var(--accent); margin-left: 4px; font-size: 11px; }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:hover { background: rgba(110, 168, 255, 0.06); }
  tbody td.ticker { color: var(--muted); font-variant-numeric: tabular-nums; }
  tbody td.name a { color: var(--text); }
  td.num { font-variant-numeric: tabular-nums; }
  .up { color: var(--up); }
  .down { color: var(--down); }
  .badge { font-size: 11px; padding: 2px 6px; border-radius: 6px; background: var(--chip); color: var(--muted); margin-left: 6px; }
  .rs { font-weight: 700; }
  .empty { padding: 60px 20px; text-align: center; color: var(--muted); }

  footer { margin-top: 16px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; color: var(--muted); font-size: 12px; }
  .pagebar { display: flex; gap: 6px; align-items: center; }
  .pagebar button { background: var(--panel); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 4px 10px; cursor: pointer; font-size: 12px; }
  .pagebar button:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Relative-Strength Screener</h1>
      <div class="sub">기간별 주가상승률 + 종합 RS 점수 · KOSPI / KOSDAQ</div>
    </div>
    <div class="meta" id="meta">로딩 중…</div>
  </header>

  <div class="tabbar">
    <div class="tab active" data-market="ALL">전체</div>
    <div class="tab" data-market="KOSPI">KOSPI</div>
    <div class="tab" data-market="KOSDAQ">KOSDAQ</div>
  </div>

  <div class="controls">
    <div class="control">
      <label>검색 (종목명 · 종목코드)</label>
      <input id="q" type="search" placeholder="예: 삼성전자, 005930" autocomplete="off" />
    </div>
    <div class="control">
      <label>섹터</label>
      <select id="sector"><option value="">전체 섹터</option></select>
    </div>
    <div class="control">
      <label>최소 시가총액 (억원)</label>
      <select id="mcap">
        <option value="0">제한 없음</option>
        <option value="500">500억 이상</option>
        <option value="1000">1,000억 이상</option>
        <option value="3000">3,000억 이상</option>
        <option value="10000">1조 이상</option>
      </select>
    </div>
    <div class="control">
      <label>표시 개수</label>
      <div class="chips" id="pagesize">
        <div class="chip" data-size="50">50개</div>
        <div class="chip active" data-size="100">100개</div>
        <div class="chip" data-size="250">250개</div>
        <div class="chip" data-size="999999">전체</div>
      </div>
    </div>
  </div>

  <div class="tablewrap">
    <table id="t">
      <thead>
        <tr>
          <th data-sort="rank" style="width:50px">#</th>
          <th data-sort="ticker">코드</th>
          <th data-sort="name">종목명</th>
          <th data-sort="sector">섹터</th>
          <th data-sort="price">현재가</th>
          <th data-sort="market_cap">시총(억)</th>
          <th data-sort="1W">1W</th>
          <th data-sort="1M">1M</th>
          <th data-sort="3M">3M</th>
          <th data-sort="6M">6M</th>
          <th data-sort="12M">12M</th>
          <th data-sort="rs">RS</th>
        </tr>
      </thead>
      <tbody id="tb"></tbody>
    </table>
    <div class="empty" id="empty" hidden>조건에 맞는 종목이 없습니다.</div>
  </div>

  <footer>
    <div>작성자: 이렌 · 데이터: pykrx (KRX) · <a href="https://github.com/" target="_blank" rel="noopener">소스코드</a></div>
    <div class="pagebar">
      <button id="prev">‹ 이전</button>
      <span id="pageinfo">1 / 1</span>
      <button id="next">다음 ›</button>
    </div>
  </footer>
</div>

<script>
const state = {
  data: null,
  market: "ALL",
  sector: "",
  query: "",
  mcap: 0,
  sortKey: "rs",
  sortDir: -1, // -1: desc, 1: asc
  pageSize: 100,
  page: 1,
};

const PERIODS = ["1W", "1M", "3M", "6M", "12M"];
const fmtPct = (v) => v == null ? "–" : (v > 0 ? "+" : "") + v.toFixed(2) + "%";
const fmtPrice = (v) => v == null ? "–" : v.toLocaleString("ko-KR");
const fmtCapEok = (v) => v == null || v === 0 ? "–" : Math.round(v / 1e8).toLocaleString("ko-KR");

// 파일을 더블클릭(file://)으로 열어도 빈 화면이 안 나오도록 인라인 폴백
const INLINE_FALLBACK = {
  updated_at: "2026-06-01T19:00:00",
  as_of: "20260601",
  count: 8,
  periods: ["1W","1M","3M","6M","12M"],
  rs_weights: {"1M":0.2,"3M":0.2,"6M":0.3,"12M":0.3},
  rows: [
    {ticker:"000660",name:"SK하이닉스",market:"KOSPI",sector:"반도체",price:215000,market_cap:156000000000000,returns:{"1W":3.10,"1M":8.50,"3M":22.10,"6M":41.20,"12M":62.80},rs:95.1},
    {ticker:"247540",name:"에코프로비엠",market:"KOSDAQ",sector:"2차전지",price:158500,market_cap:15500000000000,returns:{"1W":4.80,"1M":12.40,"3M":28.40,"6M":35.10,"12M":52.30},rs:89.2},
    {ticker:"086520",name:"에코프로",market:"KOSDAQ",sector:"2차전지",price:75200,market_cap:19800000000000,returns:{"1W":5.20,"1M":14.10,"3M":31.20,"6M":38.80,"12M":47.50},rs:88.7},
    {ticker:"005930",name:"삼성전자",market:"KOSPI",sector:"반도체",price:82500,market_cap:492000000000000,returns:{"1W":1.85,"1M":4.20,"3M":12.30,"6M":18.40,"12M":24.10},rs:78.4},
    {ticker:"207940",name:"삼성바이오로직스",market:"KOSPI",sector:"제약/바이오",price:825000,market_cap:58700000000000,returns:{"1W":0.80,"1M":3.20,"3M":9.40,"6M":14.50,"12M":19.80},rs:71.5},
    {ticker:"035420",name:"NAVER",market:"KOSPI",sector:"소프트웨어",price:198000,market_cap:32500000000000,returns:{"1W":1.20,"1M":5.40,"3M":11.80,"6M":8.70,"12M":14.20},rs:62.8},
    {ticker:"035720",name:"카카오",market:"KOSPI",sector:"소프트웨어",price:48200,market_cap:21300000000000,returns:{"1W":-0.50,"1M":-2.10,"3M":3.40,"6M":-1.20,"12M":-8.30},rs:32.5},
    {ticker:"068270",name:"셀트리온",market:"KOSPI",sector:"제약/바이오",price:178000,market_cap:38900000000000,returns:{"1W":-1.20,"1M":-3.50,"3M":-8.20,"6M":-12.30,"12M":-15.40},rs:18.2}
  ]
};

async function load() {
  const meta = document.getElementById("meta");
  // file:// 로 열면 fetch가 막히므로 바로 폴백
  if (location.protocol === "file:") {
    state.data = INLINE_FALLBACK;
    populateSectors();
    meta.innerHTML = `<span style="color:#ffb86b">⚠ 로컬 미리보기 모드 (샘플 ${INLINE_FALLBACK.count}개)</span> · 실제 데이터를 보려면 GitHub Pages에 올리거나 로컬 서버로 실행하세요`;
    render();
    return;
  }
  try {
    const res = await fetch("data/stocks.json?ts=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    state.data = json;
    populateSectors();
    meta.textContent = `기준일 ${json.as_of} · ${json.count.toLocaleString()}개 종목 · 업데이트 ${json.updated_at.replace("T", " ")}`;
    render();
  } catch (e) {
    meta.textContent = "데이터 로드 실패: " + e.message + " (data/stocks.json 필요)";
  }
}

function populateSectors() {
  const sectors = Array.from(new Set(state.data.rows.map(r => r.sector).filter(Boolean))).sort();
  const sel = document.getElementById("sector");
  // 기존 옵션(첫 항목 "전체 섹터"만 남김) 제거
  while (sel.options.length > 1) sel.remove(1);
  for (const s of sectors) {
    const opt = document.createElement("option");
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  }
}

function filtered() {
  if (!state.data) return [];
  const q = state.query.trim().toLowerCase();
  const minCap = state.mcap * 1e8; // 억 → 원
  let arr = state.data.rows.filter(r => {
    if (state.market !== "ALL" && r.market !== state.market) return false;
    if (state.sector && r.sector !== state.sector) return false;
    if (minCap > 0 && (r.market_cap || 0) < minCap) return false;
    if (q && !(r.name.toLowerCase().includes(q) || r.ticker.includes(q))) return false;
    return true;
  });
  const k = state.sortKey;
  const dir = state.sortDir;
  arr.sort((a, b) => {
    let av, bv;
    if (PERIODS.includes(k)) { av = a.returns[k]; bv = b.returns[k]; }
    else if (k === "rank") return 0;
    else { av = a[k]; bv = b[k]; }
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    if (typeof av === "string") return av.localeCompare(bv, "ko") * dir;
    return (av - bv) * dir;
  });
  return arr;
}

function render() {
  const tb = document.getElementById("tb");
  const empty = document.getElementById("empty");
  const arr = filtered();
  const total = arr.length;
  const pages = Math.max(1, Math.ceil(total / state.pageSize));
  if (state.page > pages) state.page = pages;
  const start = (state.page - 1) * state.pageSize;
  const page = arr.slice(start, start + state.pageSize);

  document.getElementById("pageinfo").textContent = `${state.page} / ${pages} · ${total.toLocaleString()}개`;
  document.getElementById("prev").disabled = state.page <= 1;
  document.getElementById("next").disabled = state.page >= pages;

  tb.innerHTML = "";
  empty.hidden = page.length > 0;

  // 헤더 sort 표시 갱신
  document.querySelectorAll("thead th").forEach(th => {
    const arrow = th.querySelector(".arrow");
    if (arrow) arrow.remove();
    if (th.dataset.sort === state.sortKey) {
      const a = document.createElement("span");
      a.className = "arrow";
      a.textContent = state.sortDir < 0 ? "▼" : "▲";
      th.appendChild(a);
    }
  });

  const frag = document.createDocumentFragment();
  page.forEach((r, i) => {
    const tr = document.createElement("tr");
    const cls = (v) => v == null ? "" : v >= 0 ? "up" : "down";
    const td = (html, klass = "") => `<td class="${klass}">${html}</td>`;
    const naverUrl = `https://finance.naver.com/item/main.naver?code=${r.ticker}`;
    tr.innerHTML =
      td(start + i + 1, "num") +
      td(r.ticker, "ticker") +
      td(`<a href="${naverUrl}" target="_blank" rel="noopener">${r.name}</a><span class="badge">${r.market}</span>`, "name") +
      td(r.sector || "–") +
      td(fmtPrice(r.price), "num") +
      td(fmtCapEok(r.market_cap), "num") +
      PERIODS.map(p => td(fmtPct(r.returns[p]), "num " + cls(r.returns[p]))).join("") +
      td((r.rs == null ? "–" : r.rs.toFixed(1)), "num rs");
    frag.appendChild(tr);
  });
  tb.appendChild(frag);
}

function setSort(key) {
  if (state.sortKey === key) state.sortDir = -state.sortDir;
  else { state.sortKey = key; state.sortDir = (key === "name" || key === "ticker" || key === "sector") ? 1 : -1; }
  state.page = 1;
  render();
}

document.querySelectorAll("thead th").forEach(th => {
  th.addEventListener("click", () => setSort(th.dataset.sort));
});
document.querySelectorAll(".tab").forEach(t => {
  t.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    state.market = t.dataset.market;
    state.page = 1; render();
  });
});
document.querySelectorAll("#pagesize .chip").forEach(c => {
  c.addEventListener("click", () => {
    document.querySelectorAll("#pagesize .chip").forEach(x => x.classList.remove("active"));
    c.classList.add("active");
    state.pageSize = parseInt(c.dataset.size, 10);
    state.page = 1; render();
  });
});
document.getElementById("q").addEventListener("input", e => { state.query = e.target.value; state.page = 1; render(); });
document.getElementById("sector").addEventListener("change", e => { state.sector = e.target.value; state.page = 1; render(); });
document.getElementById("mcap").addEventListener("change", e => { state.mcap = parseInt(e.target.value, 10); state.page = 1; render(); });
document.getElementById("prev").addEventListener("click", () => { state.page = Math.max(1, state.page - 1); render(); });
document.getElementById("next").addEventListener("click", () => { state.page = state.page + 1; render(); });

load();
</script>
</body>
</html>

name: Update RS data

on:
  schedule:
    # KST 18:00 = UTC 09:00 (평일만) — market 과 동일 시간대
    # 주의: GitHub Actions scheduled workflow는 정시 보장 안 됨 (수시간 지연 가능).
    # Oracle VM 으로 이관 시도했으나 VM 메모리 부족 (1GB) 으로 보류.
    # Ampere A1 capacity 잡히거나 유료 서버로 옮기면 다시 VM cron 으로 이관 예정.
    - cron: "0 9 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Update stocks.json
        run: python scripts/update_data.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "data: update $(date -u +%Y-%m-%d)"
            git push
          fi
